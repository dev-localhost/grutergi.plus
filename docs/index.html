<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>그루터기+</title>

    <!-- 아이콘 설정 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <div class="toolbar">
        <div style="width: 40px;"></div> <!-- Spacer for balance -->
        <h1 id="toolbar-title">셀 출석부</h1>
        <button class="icon-btn" onclick="openSettings()" title="명단 설정">
            <span class="material-symbols-rounded">menu</span>
        </button>
    </div>

    <div id="stump-view" class="view-container">
        <div class="container">
            <div class="date-container">
                <input type="date" id="stump-date-picker" class="date-input" aria-label="출석 날짜 선택">
            </div>

            <div class="search-container">
                <input type="text" id="etSearch" placeholder="이름 또는 초성 입력" autocomplete="off" aria-label="이름 또는 초성 검색">
                <div id="suggestion-box" class="suggestion-box"></div>
            </div>

            <div class="stats-card">
                <div class="stat-item">
                    <span class="count total-count" id="tvAttendanceCount">0</span>
                    <span class="label">전체</span>
                </div>
                <div class="stat-item">
                    <span class="count male-color" id="tvMaleCount">0</span>
                    <span class="label">남</span>
                </div>
                <div class="stat-item">
                    <span class="count female-color" id="tvFemaleCount">0</span>
                    <span class="label">여</span>
                </div>
            </div>

            <div class="section-title male-color">남</div>
            <div id="cgMalePresent" class="chip-group"></div>

            <div class="section-title female-color">여</div>
            <div id="cgFemalePresent" class="chip-group"></div>
        </div>

        <div class="fab-container">
            <button class="btn-round btn-reset" onclick="confirmReset()" title="출석 초기화">
                <span class="material-symbols-rounded">refresh</span>
            </button>
            <button class="btn-round btn-share" onclick="shareAttendance()" title="공유">
                <span class="material-symbols-rounded">share</span>
            </button>
        </div>
    </div>

    <div id="cell-view" class="view-container active">
        <div class="container">
            <div class="date-container">
                <input type="date" id="cell-date-picker" class="date-input" aria-label="출석 날짜 선택">
            </div>

            <div class="cell-name-container">
                <input type="text" id="etCellName" placeholder="셀 이름 입력 (예: 홍길동 셀)" aria-label="셀 이름">
                <button class="icon-btn" onclick="openCellSettings()" title="항목 설정">
                    <span class="material-symbols-rounded">tune</span>
                </button>
            </div>

            <div class="stats-card" id="cellStatsCard">
                <!-- 동적으로 통계 아이템이 생성됨 -->
            </div>

            <div id="cellMemberList" class="cell-member-list">
                <!-- Cell member list will be rendered here -->
            </div>

            <button class="btn-add-member" onclick="openAddMemberModal()">
                <span class="material-symbols-rounded">person_add</span>
                <span>인원 추가</span>
            </button>
        </div>

        <div class="fab-container">
            <button class="btn-round btn-reset" onclick="confirmCellReset()" title="셀 출석 초기화">
                <span class="material-symbols-rounded">refresh</span>
            </button>
            <button class="btn-round btn-share" onclick="copyCellAttendance()" title="복사하기">
                <span class="material-symbols-rounded">content_copy</span>
            </button>
        </div>
    </div>

    <div id="addMemberModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle" style="font-size:18px; font-weight:bold; margin-bottom:12px;">성별 선택</div>
            <div class="modal-body" id="modalBody" style="margin-bottom:20px; color:#666;">명단에 추가할 인원의 성별을 선택해주세요.</div>
            <div class="modal-btns">
                <button class="btn-blue" onclick="processAddMember(true)">남</button>
                <button class="btn-pink" onclick="processAddMember(false)">여</button>
                <button class="btn-gray" onclick="closeModal('addMemberModal')">취소</button>
            </div>
        </div>
    </div>

    <!-- 공통 확인 모달 -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="confirmTitle" style="font-size:18px; font-weight:bold; margin-bottom:12px;">확인</div>
            <div class="modal-body" id="confirmBody" style="margin-bottom:20px; color:#666;">내용</div>
            <div class="modal-btns">
                <button id="btnConfirmAction" class="btn-pink">확인</button>
                <button class="btn-gray" onclick="closeModal('confirmModal')">취소</button>
            </div>
        </div>
    </div>

    <!-- 명단 설정 사이드 뷰 (오른쪽에서 슬라이드) -->
    <div id="settingsSideView" class="side-view">
        <div class="side-header">
            <button class="icon-btn" onclick="closeSideView()">
                <span class="material-symbols-rounded">arrow_forward_ios</span>
            </button>
            <div class="side-title">명단 관리</div>
            <div style="width: 40px;"></div>
        </div>

        <div class="settings-content">
            <div class="settings-add-box">
                <textarea id="etSettingsAddNames" placeholder="추가할 이름들을 입력하세요&#10;(쉼표, 공백, 줄바꿈으로 구분)" aria-label="추가할 명단 입력"></textarea>
                <button class="btn-main" onclick="startBatchAdd()">추가</button>
            </div>

            <div id="settingsStats" class="stats-card" style="margin-bottom: 24px;">
                <!-- 명단 통계가 들어갈 자리 -->
            </div>

            <div id="settingsMemberListContainer">
                <!-- 초성별/성별 그룹화된 명단이 칩 형태로 들어감 -->
            </div>

            <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px;">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-gray-outline" style="flex: 1; color: var(--primary-color); border-color: var(--primary-color);" onclick="clearMembersByGender(true)">남자 전체 삭제</button>
                    <button class="btn-gray-outline" style="flex: 1; color: var(--secondary-color); border-color: var(--secondary-color);" onclick="clearMembersByGender(false)">여자 전체 삭제</button>
                </div>
                <button class="btn-black-outline" onclick="clearAllMembers()">전체 삭제</button>
            </div>
        </div>
    </div>

    <!-- 셀 전용 설정 모달 (체크 항목 선택) -->
    <div id="cellSettingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">체크 항목 설정</div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                <label class="check-item-label">
                    <input type="checkbox" id="checkItemAttendance" checked disabled> 출석 (필수)
                </label>
                <label class="check-item-label">
                    <input type="checkbox" id="checkItemPbs" checked> PBS
                </label>
                <label class="check-item-label">
                    <input type="checkbox" id="checkItemWednesday" checked> 수요예배
                </label>
                <label class="check-item-label">
                    <input type="checkbox" id="checkItemFriday" checked> 금요기도회
                </label>
            </div>
            <div class="modal-btns">
                <button class="btn-blue" onclick="saveCellSettings()">저장</button>
                <button class="btn-gray" onclick="closeModal('cellSettingsModal')">닫기</button>
            </div>
        </div>
    </div>

    <!-- 초기화 옵션 선택 모달 -->
    <div id="resetOptionsModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">초기화 선택</div>
            <div class="modal-body" style="margin-bottom: 20px;">어떤 항목을 초기화하시겠습니까?</div>
            <div class="modal-btns" style="flex-direction: column;">
                <button class="btn-pink" onclick="resetCellAttendanceOnly()" style="width: 100%; margin-bottom: 8px;">체크 기록만 초기화</button>
                <button class="btn-black-outline" onclick="resetCellFull()" style="width: 100%; margin-bottom: 8px;">명단까지 전체 초기화</button>
                <button class="btn-gray" onclick="closeModal('resetOptionsModal')" style="width: 100%;">취소</button>
            </div>
        </div>
    </div>

    <!-- 셀 인원 추가 모달 -->
    <div id="cellAddMemberModal" class="modal">
        <div class="modal-content" style="max-height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div class="modal-title" style="font-size:18px; font-weight:bold;">셀 인원 추가</div>
                <button class="icon-btn" onclick="closeModal('cellAddMemberModal')" style="width: 32px; height: 32px;">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>

            <div class="search-container" style="margin-bottom: 16px;">
                <input type="text" id="etCellAddSearch" placeholder="이름 또는 초성 검색" autocomplete="off">
            </div>

            <div id="cellAddMemberList" style="flex: 1; overflow-y: auto; margin-bottom: 16px;">
                <!-- 검색 결과 또는 전체 명단이 나옴 -->
            </div>

            <div class="modal-btns">
                <button class="btn-gray" onclick="closeModal('cellAddMemberModal')">닫기</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div class="floating-nav-container">
        <div class="segmented-control">
            <div class="segment active" onclick="switchView('cell')" id="seg-cell">셀 출석</div>
            <div class="segment" onclick="switchView('stump')" id="seg-stump">그루터기</div>
            <div class="slider"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
